function renderFotos(urls) {
  const grid = document.getElementById('galleryGrid');
  const counter = document.getElementById('photoCounter');
  const unique = [...new Set(urls.filter(Boolean))];
  counter.textContent = unique.length ? unique.length + ' fotos carregadas' : '';
  grid.innerHTML = unique.length
    ? unique.map(u => `<a href="${u}" target="_blank" class="photo-link"><img src="${u}" alt="Toldo Cortina" loading="lazy" decoding="async" onerror="this.closest('a').remove()"></a>`).join('')
    : '<div class="empty">Nenhuma foto cadastrada nessa categoria.</div>';
}

async function carregarGaleria(){
  const urls = [...FOTOS_FIXAS_TOLDO_CORTINA];

  // Mantém compatível com fotos enviadas pelo Admin/Volume, se existirem.
  try {
    const r = await fetch('/api/gallery?category=toldo-cortina', {cache:'no-store'});
    if (r.ok) {
      const d = await r.json();
      const photos = d.photos || [];
      photos.forEach(p => {
        const u = p.src || p.url || p.image || p.path;
        if (u) urls.push(u);
      });
    }
  } catch(e) {}

  renderFotos(urls);
}
carregarGaleria();
